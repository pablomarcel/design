# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    1_intro/tests
    2_materials/tests
    3_load/tests
    4_deflection/tests
    5_failureStatic/tests
    6_failureDynamic/tests
    7_shafts/tests
    8_screws/tests
    9_welding/tests
    10_springs/tests
    11_rollingBearings/tests
    12_journalBearings/tests
    13_gears/tests
    14_spurGears/tests
    15_bevelGears/tests
    16_clutches/tests
    17_flexible/tests
    18_transmission/tests
    19_fea/tests
    20_gdt/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=1_intro
    --cov=2_materials
    --cov=3_load
    --cov=4_deflection
    --cov=5_failureStatic
    --cov=6_failureDynamic
    --cov=7_shafts
    --cov=8_screws
    --cov=9_welding
    --cov=10_springs
    --cov=11_rollingBearings
    --cov=12_journalBearings
    --cov=13_gears
    --cov=14_spurGears
    --cov=15_bevelGears
    --cov=16_clutches
    --cov=17_flexible
    --cov=18_transmission
    --cov=19_fea
    --cov=20_gdt
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60


# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
