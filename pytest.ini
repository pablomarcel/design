# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    introduction/tests
    materials/tests
    load_stress/tests
    deflection_stiffness/tests
    static_failure/tests
    fatigue_failure/tests
    shafts/tests
    screws_fasteners/tests
    welding_bonding/tests
    mechanical_springs/tests
    rolling_contact_bearings/tests
    journal_bearings/tests
    gears/tests
    spur_helical_gears/tests
    bevel_worm_gears/tests
    clutches_brakes_flywheels/tests
    flexible_elements/tests
    transmission/tests
    finite_element_analysis/tests
    geometric_dimensioning/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=introduction
    --cov=materials
    --cov=load_stress
    --cov=deflection_stiffness
    --cov=static_failure
    --cov=fatigue_failure
    --cov=shafts
    --cov=screws_fasteners
    --cov=welding_bonding
    --cov=mechanical_springs
    --cov=rolling_contact_bearings
    --cov=journal_bearings
    --cov=gears
    --cov=spur_helical_gears
    --cov=bevel_worm_gears
    --cov=clutches_brakes_flywheels
    --cov=flexible_elements
    --cov=transmission
    --cov=finite_element_analysis
    --cov=geometric_dimensioning
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60

# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
