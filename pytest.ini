# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    intro/tests
    materials/tests
    load/tests
    deflection/tests
    failureStatic/tests
    failureDynamic/tests
    shafts/tests
    screws/tests
    welding/tests
    springs/tests
    rollingBearings/tests
    journalBearings/tests
    gears/tests
    spurGears/tests
    bevelGears/tests
    clutches/tests
    flexible/tests
    transmission/tests
    fea/tests
    gdt/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=intro
    --cov=materials
    --cov=load
    --cov=deflection
    --cov=failureStatic
    --cov=failureDynamic
    --cov=shafts
    --cov=screws
    --cov=welding
    --cov=springs
    --cov=rollingBearings
    --cov=journalBearings
    --cov=gears
    --cov=spurGears
    --cov=bevelGears
    --cov=clutches
    --cov=flexible
    --cov=transmission
    --cov=fea
    --cov=gdt
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60

# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
